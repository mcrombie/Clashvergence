name: Daily Azhora Advance

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # Allow manual trigger for testing or milestone narrative runs

jobs:
  advance:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push updated world state files back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai>=1.0.0

      - name: Advance simulation one turn
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLASHVERGENCE_ENABLE_AI_INTERPRETATION: '0'
        run: |
          python main.py \
            --headless-advance \
            --run-dir reports/runs/azhora_sc4_live \
            --ai-narrative off

      - name: Export sim_world.json for the web viewer
        run: python export_sim_world.py

      - name: Commit updated world state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/runs/azhora_sc4_live/world_state.json
          git add reports/runs/azhora_sc4_live/sim_world.json
          TURN=$(python -c 'import json; print(json.load(open("reports/runs/azhora_sc4_live/world_state.json"))["turn"])')
          git diff --cached --quiet || git commit -m "chore: daily Azhora advance (turn ${TURN})"
          git push
